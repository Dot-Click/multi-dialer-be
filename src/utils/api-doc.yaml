  /api/system-settings/caller-id/create:
    post:
      summary: "Create a new CallerId"
      tags:
        - SystemSettings CallerId
      description: "Create a new CallerId in the authenticated user's system settings"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - label
                - countryCode
              properties:
                label:
                  type: string
                  description: "Label for the CallerId"
                  example: "Main Sales Line"
                availableTo:
                  type: array
                  items:
                    type: string
                    enum: ["ALL", "SALES", "SUPPORT", "PROJECT_MANAGER"]
                  description: "Array of teams that can use this number"
                  example: ["ALL", "SALES"]
                onHoldRecording1:
