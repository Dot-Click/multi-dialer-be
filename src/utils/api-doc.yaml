# ------------------------------------------------------------------------------------------
  # Route 1: Create (Post to /create)
  # ------------------------------------------------------------------------------------------
  /api/system-settings/dialer-settings/create:
    post:
      summary: "Create Dialer Settings"
      tags:
        - SystemSettings DialerSetting
      description: "Create initial dialer settings for the authenticated user. This should only be called once."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - useTimeShield
              properties:
                useTimeShield:
                  type: boolean
                  default: false
                timeShieldStartTime:
                  type: string
                  example: "09:00"
                timeShieldEndTime:
                  type: string
                  example: "17:00"
                useAnswerNotificationTone:
                  type: boolean
                  default: false
                deleteDisconnectedNumbers:
                  type: boolean
                  default: false
                deleteFaxNumbers:
                  type: boolean
                  default: false
                useCallSessionTimer:
                  type: boolean
                  default: false
      responses:
        "201":
          description: "Created successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialerSettingResponse'
        "400":
          description: "Settings already exist (Use PUT) or Validation Error"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden (Admin/Owner only)"

  # ------------------------------------------------------------------------------------------
  # Route 2: Get All (For Admin/Owner)
  # ------------------------------------------------------------------------------------------
  /api/system-settings/dialer-settings/all:
    get:
      summary: "Get All Dialer Settings"
      tags:
        - SystemSettings DialerSetting
      description: "Admin/Owner only. Retrieve a list of dialer settings for all users."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetched successfully"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DialerSettingResponse'
        "403":
          description: "Forbidden (Access Denied)"

  # ------------------------------------------------------------------------------------------
  # Route 3: Get My Settings (Root Route)
  # ------------------------------------------------------------------------------------------
  /api/system-settings/dialer-settings:
    get:
      summary: "Get My Dialer Settings"
      tags:
        - SystemSettings DialerSetting
      description: "Retrieve the dialer settings associated with the logged-in user's account."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetched successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DialerSettingResponse'
        "404":
          description: "Settings not found"

  # ------------------------------------------------------------------------------------------
  # Route 4: ID Based Routes (Get, Update, Delete specific ID)
  # ------------------------------------------------------------------------------------------
  /api/system-settings/dialer-settings/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: "The UUID of the Dialer Setting"
    
    get:
      summary: "Get Dialer Setting by ID"
      tags:
        - SystemSettings DialerSetting
