openapi: "3.1.0"
info:
  title: "Boilerplate API Documentation"
  version: "1.0.0"
  description: "API documentation using Swagger"

servers:
  [
    { url: "http://localhost:3000", description: "Local server" },
  ]

tags:
  - name: Products
    description: Product management endpoints
  - name: Library Scripts
    description: Call script creation and management
  - name: Library SMS
    description: SMS template creation and management
  - name: Library Email
    description: Email template creation and management
  - name: Library Media Center
    description: Audio/video file management
  - name: Library Callback Prompt
    description: Callback prompt template management
  - name: SystemSettings CallerId
    description: Caller ID configuration
  - name: SystemSettings CallSettings
    description: Call settings configuration
  - name: SystemSettings MiscFields
    description: Miscellaneous field configuration
  - name: Authentication
    description: User authentication and session management
  - name: SystemSettings Integrations
    description: Third-party service connections (Twilio, Google, etc.)

paths:
  /api/products:
    get:
      summary: "Get all products"
      tags:
        - Products
      description: "Get all products"
      responses:
        "200":
          description: "Products fetched successfully"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    price:
                      type: number
                    category:
                      type: string
                    description:
                      type: string
                    thumbnail:
                      type: string
                    images:
                      type: array
                      items:
                        type: string
                    userId:
                      type: string
                    createdAt:
                      type: string
                    updatedAt:
                      type: string
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: "Product not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/library/script/create:
    post:
      summary: "Create a new script"
      tags:
        - Library Scripts
      description: "Create a new script in the authenticated user's library"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scriptName
                - scriptText
              properties:
                scriptName:
                  type: string
                  description: "Name of the script"
                  example: "Sales Introduction Script"
                scriptText:
                  type: string
                  description: "Content/text of the script"
                  example: "Hello, this is a sales call..."
                status:
                  type: boolean
                  description: "Status of the script (active/inactive)"
                  default: true
      responses:
        "201":
          description: "Script created successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      scriptName:
                        type: string
                      scriptText:
                        type: string
                      status:
                        type: boolean
                      libraryId:
                        type: string
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                      library:
                        type: object
                        properties:
                          id:
                            type: string
                          userId:
                            type: string
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              fullName:
                                type: string
                              email:
                                type: string
        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "User not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/library/script/all:
    get:
      summary: "Get all scripts of all users"
      tags:
        - Library Scripts
      description: "Retrieve all scripts from all users (requires authentication)"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "All scripts fetched successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        scriptName:
                          type: string
                        scriptText:
                          type: string
                        status:
                          type: boolean
                        libraryId:
                          type: string
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                        library:
                          type: object
                          properties:
                            id:
                              type: string
                            userId:
                              type: string
                            user:
                              type: object
                              properties:
                                id:
                                  type: string
                                fullName:
                                  type: string
                                email:
                                  type: string
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/library/script:
    get:
      summary: "Get all scripts of specific user"
      tags:
        - Library Scripts
      description: "Retrieve all scripts belonging to the authenticated user's library"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Scripts fetched successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        scriptName:
                          type: string
                        scriptText:
                          type: string
                        status:
                          type: boolean
                        libraryId:
                          type: string
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                        library:
                          type: object
                          properties:
                            id:
                              type: string
                            userId:
                              type: string
                            user:
                              type: object
                              properties:
                                id:
                                  type: string
                                fullName:
                                  type: string
                                email:
                                  type: string
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "Library not found for user"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/library/script/{id}:
    get:
      summary: "Get a script by ID"
      tags:
        - Library Scripts
      description: "Retrieve a specific script by its ID (must belong to authenticated user's library)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "Script ID"
      responses:
        "200":
          description: "Script fetched successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      scriptName:
                        type: string
                      scriptText:
                        type: string
                      status:
                        type: boolean
                      libraryId:
                        type: string
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                      library:
                        type: object
                        properties:
                          id:
                            type: string
                          userId:
                            type: string
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              fullName:
                                type: string
                              email:
                                type: string
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "Script not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

    put:
      summary: "Update a script by ID"
      tags:
        - Library Scripts
      description: "Update a specific script (must belong to authenticated user's library)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "Script ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scriptName:
                  type: string
                  description: "Name of the script"
                  example: "Updated Sales Script"
                scriptText:
                  type: string
                  description: "Content/text of the script"
                  example: "Updated script content..."
                status:
                  type: boolean
                  description: "Status of the script (active/inactive)"
      responses:
        "200":
          description: "Script updated successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      scriptName:
                        type: string
                      scriptText:
                        type: string
                      status:
                        type: boolean
                      libraryId:
                        type: string
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                      library:
                        type: object
                        properties:
                          id:
                            type: string
                          userId:
                            type: string
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              fullName:
                                type: string
                              email:
                                type: string
        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "403":
          description: "Forbidden - Cannot update another user's script"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "Script not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

    delete:
      summary: "Delete a script by ID"
      tags:
        - Library Scripts
      description: "Delete a specific script (must belong to authenticated user's library)"
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: "Script ID"
      responses:
        "200":
          description: "Script deleted successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: null
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "403":
          description: "Forbidden - Cannot delete another user's script"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "Script not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /api/library/callback-prompt/create:
