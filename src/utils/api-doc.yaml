                      type: string
                      description: "Name of the field"
                      example: "Customer Type"
                    type:
                      type: string
                      enum: ["text"]
                      description: "Field type"
                      example: "text"
                - type: object
                  required:
                    - fieldName
                    - type
                    - options
                  properties:
                    fieldName:
                      type: string
                      description: "Name of the field"
                      example: "Priority Level"
                    type:
                      type: string
                      enum: ["dropdown"]
                      description: "Field type"
                      example: "dropdown"
                    options:
                      type: array
                      items:
                        type: string
                      minItems: 1
                      description: "Array of dropdown options"
                      example: ["High", "Medium", "Low"]
                - type: object
                  required:
                    - fieldName
                    - type
                    - countFrom
                    - countTo
                  properties:
                    fieldName:
                      type: string
                      description: "Name of the field"
                      example: "Quantity"
                    type:
                      type: string
                      enum: ["counter"]
                      description: "Field type"
                      example: "counter"
                    countFrom:
                      type: integer
                      description: "Starting count value"
                      example: 0
                    countTo:
                      type: integer
                      description: "Ending count value (must be greater than countFrom)"
                      example: 100
                - type: object
                  required:
                    - fieldName
                    - type
                  properties:
                    fieldName:
                      type: string
                      description: "Name of the field"
                      example: "Appointment Date"
                    type:
                      type: string
                      enum: ["date"]
                      description: "Field type"
                      example: "date"
