openapi: "3.1.0"
info:
  title: "Boilerplate API Documentation"
  version: "1.0.0"
  description: "API documentation using Swagger"

servers:
  [
    { url: "http://localhost:3000", description: "Local server" },
  ]

paths:

  /api/products:
    get:
      summary: "Get all products"
      tags:
        - Products
      description: "Get all products"
      responses:
        "200":
          description: "Products fetched successfully"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    price:
                      type: number
                    category:
                      type: string
                    description:
                      type: string
                    thumbnail:
                      type: string
                    images:
                      type: array
                      items:
                        type: string
                    userId:
                      type: string
                    createdAt:
                      type: string
                    updatedAt:
                      type: string
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "404":
          description: "Product not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/library/script/create:
    post:
      summary: "Create a new script"
      tags:
        - Library Scripts
      description: "Create a new script in the authenticated user's library"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scriptName
                - scriptText
              properties:
                scriptName:
                  type: string
                  description: "Name of the script"
                  example: "Sales Introduction Script"
                scriptText:
                  type: string
                  description: "Content/text of the script"
                  example: "Hello, this is a sales call..."
                status:
                  type: boolean
                  description: "Status of the script (active/inactive)"
                  default: true
      responses:
        "201":
          description: "Script created successfully"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      scriptName:
                        type: string
                      scriptText:
                        type: string
                      status:
                        type: boolean
                      libraryId:
                        type: string
                      createdAt:
                        type: string
                      updatedAt:
                        type: string
                      library:
                        type: object
                        properties:
                          id:
                            type: string
                          userId:
                            type: string
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                              fullName:
                                type: string
                              email:
                                type: string
        "400":
          description: "Validation error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  errors:
                    type: array
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "404":
          description: "User not found"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

