          description: "Settings not found"

    put:
      summary: "Update Dialer Settings"
      tags:
        - SystemSettings DialerSetting
      description: "Update existing dialer settings by ID."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                useTimeShield:
                  type: boolean
                timeShieldStartTime:
                  type: string
                timeShieldEndTime:
                  type: string
                useAnswerNotificationTone:
                  type: boolean
                deleteDisconnectedNumbers:
                  type: boolean
                deleteFaxNumbers:
                  type: boolean
                useCallSessionTimer:
                  type: boolean
      responses:
        "200":
          description: "Updated successfully"
          content:
            application/json:
              schema:
