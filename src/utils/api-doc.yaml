# --- SYSTEM SETTINGS: INTEGRATIONS ---
  /api/system-settings/integrations/create:
    post:
      summary: "Create/Connect Integration"
      tags: [SystemSettings Integrations]
      description: "Initial connection for a provider. Uses upsert logic to ensure one record per provider per user."
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, credentials]
              properties:
                provider:
                  type: string
                  enum: [TWILIO, GOOGLE_MAPS, REALTOR_DOT_COM, BOMB_BOMB, GMAIL, STANPP_DOT_COM, MY_PLUS_LEADS, ZAPIER]
                  example: "GMAIL"
                credentials:
                  type: object
                  description: "JSON object for API keys or tokens"
                  example: { "apiKey": "your_api_key_here" }
      responses:
        "201":
          description: "Connected successfully"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IntegrationResponse' }

  /api/system-settings/integrations/all:
    get:
      summary: "Get All Integrations (Admin)"
      tags: [SystemSettings Integrations]
      description: "Retrieve every integration record in the system. Admin/Owner only."
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: "Fetched successfully"
          content:
            application/json:
              schema:
                type: array
