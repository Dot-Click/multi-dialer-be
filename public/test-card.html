<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoho Card Collection - Test UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5850ec;
            --primary-hover: #4e46e5;
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            transition: transform 0.2s ease;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .info-box {
            background-color: rgba(88, 80, 236, 0.05);
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        #result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            word-break: break-all;
            white-space: pre-wrap;
            text-align: center;
        }

        #result.success {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        #result.error {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .payment-link {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background-color: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .payment-link:hover {
            opacity: 0.9;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zoho Card Attachment</h1>
        <p class="subtitle">Securely add your card details via Zoho Hosted Pages</p>
        
        <div class="info-box">
            Due to PCI compliance and Zoho security policies, card details cannot be sent directly via API. Click the button below to generate a secure payment link.
        </div>
        
        <button id="generateBtn">
            <span id="btnText">Generate Secure Payment Link</span>
            <div class="loader" id="loader"></div>
        </button>

        <div id="result"></div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');

        generateBtn.addEventListener('click', async () => {
            // UI State
            generateBtn.disabled = true;
            loader.style.display = 'block';
            resultDiv.style.display = 'none';

            try {
                const response = await fetch('/api/subscriptions/update-card-link', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    const hostedPageUrl = data.data.hostedpage.url;
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <p>Link generated successfully!</p>
                        <a href="${hostedPageUrl}" class="payment-link" target="_blank">Open Secure Payment Form</a>
                        <p style="margin-top: 10px; font-size: 12px; color: var(--text-muted)">Once you add the card, you can close the tab and return here.</p>
                    `;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.textContent = `Error: ${data.message || 'Failed to generate link'}`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.textContent = `Network Error: ${error.message}`;
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
